<!DOCTYPE html>
<html>
<head>

<title>SUPER POWER TECHNOLOGY</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
}

.search{
text-align:center;
margin:15px;
}

.search input{
padding:10px;
width:80%;
max-width:350px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.price{
color:#ff6a00;
font-weight:bold;
}

button{
background:#ff6a00;
color:white;
border:none;
padding:8px 12px;
margin-top:5px;
cursor:pointer;
}

#cart{
position:fixed;
right:10px;
top:80px;
background:white;
padding:10px;
width:200px;
box-shadow:0 0 5px black;
}

</style>

</head>

<body>

<header>

<h2>SUPER POWER TECHNOLOGY</h2>

</header>

<div class="search">

<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">

</div>

<div class="products" id="productList">

</div>

<div id="cart">

<h3>Cart</h3>

<div id="cartItems"></div>

<p>Total: <span id="total">0</span>৳</p>

<button onclick="sendOrder()">Order</button>

</div>

<script src="products.js"></script>

<script>

let cart=[]
let total=0

function loadProducts(){

let html=""

products.forEach(p=>{

html+=`

<div class="card">

<img src="images/${p.image}">

<h4>${p.name}</h4>

<p class="price">${p.price}</p>

<button onclick="addToCart('${p.name}',${p.base})">

Add to Cart

</button>

</div>

`

})

document.getElementById("productList").innerHTML=html

}

loadProducts()

function addToCart(name,price){

cart.push(name)

total+=price

document.getElementById("cartItems").innerHTML=cart.join("<br>")

document.getElementById("total").innerText=total

}

function sendOrder(){

let msg="Order:%0A"+cart.join("%0A")+"%0ATotal:"+total+"৳"

window.open("https://wa.me/8801836082847?text="+msg)

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(c=>{

if(c.innerText.toLowerCase().includes(input))

c.style.display="block"

else

c.style.display="none"

})

}

</script>

</body>
</html>
